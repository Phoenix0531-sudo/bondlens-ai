services:
  bondlens-ai:
    build: .
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-me}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_STYLE: ${OPENAI_API_STYLE:-auto}
      BOND_DATA_MODE: ${BOND_DATA_MODE:-auto}
      BOND_LIVE_CACHE_PATH: ${BOND_LIVE_CACHE_PATH:-}
      BOND_LIVE_CACHE_MAX_AGE_HOURS: ${BOND_LIVE_CACHE_MAX_AGE_HOURS:-24}
      FLASK_RUN_HOST: 0.0.0.0
      PORT: 5000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/healthz', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
