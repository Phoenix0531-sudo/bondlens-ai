name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests and agent evals
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      FLASK_ENV: testing
      SECRET_KEY: ci-secret-key
      OPENAI_API_KEY: ""
      OPENAI_MODEL: gpt-5.4-mini
      BOND_DATA_MODE: static

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run ruff
        run: python -m ruff check .

      - name: Run pytest
        run: python -m pytest -q

      - name: Run agent evals
        run: python evals/run_agent_evals.py

      - name: Run red-team evals
        run: python evals/run_red_team_evals.py

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t bondlens-ai:ci .
