name: Feature request
description: Suggest an improvement for BondLens AI
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or engineering problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version of the feature.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence and safety impact
      description: How should the feature stay evidence-grounded and non-advisory?
    validations:
      required: true
