- id: market_overview
  question: 当前样本收益率分布是什么样？
  expected_intent: market_overview
  expected_tools:
    - describe_market
    - generate_bond_report
  must_include:
    - 样本
    - 收益率

- id: concrete_bond_search_report
  question: 搜索23附息国债26并给出收益率分析
  expected_intent: bond_report
  expected_tools:
    - search_bonds
    - compare_bond_to_market
    - describe_market
    - rank_bonds
    - detect_yield_outliers
    - generate_bond_report
  must_include:
    - 23附息国债26
    - 分位数

- id: highest_yield_ranking
  question: 按收益率列出最高的前5只债券
  expected_intent: ranking
  expected_tools:
    - rank_bonds
    - generate_bond_report
  must_include:
    - 排序
    - 排名首位

- id: volume_ranking
  question: 按成交量列出最活跃的前5只债券
  expected_intent: ranking
  expected_tools:
