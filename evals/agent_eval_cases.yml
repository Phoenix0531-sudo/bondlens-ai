- id: empty_question_fallback
  question: ""
  expected_intent: market_overview
  expected_tools:
    - describe_market
    - generate_bond_report
  must_include:
    - 样本
    - 非投资建议

- id: missing_bond
  question: 搜索"不存在债券XYZ"并给出收益率分析
  expected_intent: bond_report
  expected_tools:
    - search_bonds
    - compare_bond_to_market
    - describe_market
    - rank_bonds
